<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0c0f0d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="doggypile" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>doggypile</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header id="header" class="topbar">
    <div id="header-left" class="topbar-left">
      <span class="brand">doggypile</span>
    </div>
    <span id="status" class="status" role="status" data-state="connecting">connecting</span>
  </header>
  <main id="main">
    <div class="state"><div class="spinner" aria-label="Loading"></div></div>
  </main>
  <footer id="composer" hidden>
    <textarea id="input" rows="1" placeholder="Message the agent…" aria-label="Message the agent" autocapitalize="sentences" enterkeyhint="send"></textarea>
    <button id="stop" class="icon-btn" aria-label="Stop the agent" title="Stop" hidden>■</button>
    <button id="send" class="icon-btn" aria-label="Send message" title="Send" disabled>↑</button>
  </footer>
  <div id="toast" class="toast" role="alert" hidden></div>
  <script type="module" src="./app.js?v=20260706-opencode-install"></script>
</body>
</html>
