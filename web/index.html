<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#121113" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="doggypile" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <title>doggypile</title>
  <link rel="stylesheet" href="./styles.css?v=20260715-fadein" />
</head>
<body>
  <header id="wstrip" class="wstrip">
    <button id="home-btn" class="home-btn" aria-label="Home" aria-current="page">
      <span class="icon brand-paw" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5.4" cy="10.2" r="2.1"/><circle cx="9.3" cy="6.5" r="2.3"/><circle cx="14.7" cy="6.5" r="2.3"/><circle cx="18.6" cy="10.2" r="2.1"/><path d="M12 10.5c-2.6 0-5.4 2.5-5.4 5.1 0 1.6 1.2 2.7 2.8 2.7 1 0 1.7-.4 2.6-.4s1.6.4 2.6.4c1.6 0 2.8-1.1 2.8-2.7 0-2.6-2.8-5.1-5.4-5.1z"/></svg></span>
      <span class="home-label">doggypile</span>
    </button>
    <div id="wtabs" class="wtabs" role="tablist" aria-label="Open sessions">
      <button id="tab-new" class="topbtn" aria-label="New session" title="New session">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5.5" x2="12" y2="18.5"/><line x1="5.5" y1="12" x2="18.5" y2="12"/></svg></span>
      </button>
    </div>
    <div class="strip-actions">
      <button id="ctx-toggle" class="topbtn" aria-pressed="true" aria-label="Toggle context panel" title="Context panel" hidden>
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="15" rx="2.5"/><line x1="14.5" y1="4.5" x2="14.5" y2="19.5"/></svg></span>
      </button>
    </div>
  </header>
  <div id="screen" class="screen">
    <div id="home" class="home">
      <div class="home-wrap">
        <div id="home-bar" class="home-bar" hidden>
          <input id="search" class="search" type="search" placeholder="Search sessions…" aria-label="Search sessions" autocomplete="off" />
          <button id="home-new" class="btn btn-accent btn-small">
            <span class="icon btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5.5" x2="12" y2="18.5"/><line x1="5.5" y1="12" x2="18.5" y2="12"/></svg></span>
            <span>New session</span>
          </button>
        </div>
        <div id="chips" class="chips" role="group" aria-label="Machines" hidden></div>
        <div id="homelist"><div class="state"><div class="spinner" aria-label="Loading"></div></div></div>
      </div>
    </div>
    <div id="sessionview" class="sessionview" hidden>
      <div id="segbar" class="segbar" role="tablist" aria-label="Session surfaces" hidden>
        <button id="seg-session" class="seg" role="tab" aria-selected="true" data-seg="session">Session</button>
        <button id="seg-context" class="seg" role="tab" aria-selected="false" tabindex="-1" data-seg="context">Context</button>
      </div>
      <div class="workspace">
        <section id="chatpane" class="chatpane" aria-labelledby="chat-title">
          <div class="chatpane-head">
            <h1 id="chat-title" class="chatpane-title"></h1>
            <button id="chat-machine" class="status" aria-haspopup="dialog" hidden></button>
          </div>
          <div id="main" class="chat-scroll"></div>
          <button id="jump" class="jump" aria-label="Scroll to latest" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="18"/><polyline points="6 12 12 18 18 12"/></svg>
          </button>
          <footer id="composer">
            <div class="composer-card">
              <div class="composer-row">
                <textarea id="input" rows="1" placeholder="Message the agent…" aria-label="Message the agent" autocapitalize="sentences" enterkeyhint="send"></textarea>
                <button id="stop" class="icon-btn stop" aria-label="Stop the agent" title="Stop" hidden>
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="7" y="7" width="10" height="10" rx="2"/></svg>
                </button>
                <button id="send" class="icon-btn send" aria-label="Send message" title="Send" disabled>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="19" x2="12" y2="6"/><polyline points="6 12 12 6 18 12"/></svg>
                </button>
              </div>
              <div class="ctools">
                <button id="machine-btn" class="machine-btn" aria-haspopup="menu" aria-expanded="false" aria-label="Choose machine"></button>
              </div>
            </div>
          </footer>
        </section>
        <div id="drawer-scrim" class="drawer-scrim" hidden></div>
        <aside id="ctxpane" class="ctxpane" aria-label="Context" hidden>
          <div class="ctx-head">
            <div class="ctx-tabs" role="tablist" aria-label="Context sections">
              <button class="ctx-tab" id="ctxtab-details" role="tab" aria-selected="true" data-ctxtab="details">Details</button>
              <button class="ctx-tab" id="ctxtab-activity" role="tab" aria-selected="false" tabindex="-1" data-ctxtab="activity">Activity</button>
              <button class="ctx-tab" id="ctxtab-changes" role="tab" aria-selected="false" tabindex="-1" data-ctxtab="changes">Changes</button>
            </div>
            <button id="ctx-close" class="topbtn" aria-label="Close context panel">
              <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></span>
            </button>
          </div>
          <div id="ctx-body" class="ctx-body" role="tabpanel" aria-labelledby="ctxtab-details" tabindex="0"></div>
        </aside>
      </div>
    </div>
  </div>
  <div id="overlay-root"></div>
  <div id="toast" class="toast" role="alert" hidden></div>
  <script type="module" src="./app.js?v=20260715-stepcopy"></script>
</body>
</html>
