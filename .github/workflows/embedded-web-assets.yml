name: Web

on:
  pull_request:
    paths:
      - 'web/**'
      - 'test/**'
      - 'scripts/test-web.mjs'
      - 'package.json'
      - 'daemon/crates/doggypile/build.rs'
      - 'daemon/crates/doggypile/src/web_assets.rs'
      - 'daemon/crates/doggypile/src/cli/web.rs'
      - '.github/workflows/embedded-web-assets.yml'
  push:
    paths:
      - 'web/**'
      - 'test/**'
      - 'scripts/test-web.mjs'
      - 'package.json'
      - 'daemon/crates/doggypile/build.rs'
      - 'daemon/crates/doggypile/src/web_assets.rs'
      - 'daemon/crates/doggypile/src/cli/web.rs'
      - '.github/workflows/embedded-web-assets.yml'

jobs:
  browser-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm run test:web

  embedded-catalog:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - run: cargo test -p doggypile web_assets::tests
