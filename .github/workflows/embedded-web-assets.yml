name: Embedded web assets

on:
  pull_request:
    paths:
      - 'web/**'
      - 'daemon/crates/doggypile/build.rs'
      - 'daemon/crates/doggypile/src/web_assets.rs'
      - 'daemon/crates/doggypile/src/cli/web.rs'
      - '.github/workflows/embedded-web-assets.yml'
  push:
    paths:
      - 'web/**'
      - 'daemon/crates/doggypile/build.rs'
      - 'daemon/crates/doggypile/src/web_assets.rs'
      - 'daemon/crates/doggypile/src/cli/web.rs'
      - '.github/workflows/embedded-web-assets.yml'

jobs:
  catalog:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - run: cargo test -p doggypile web_assets::tests
      - name: Check production JavaScript syntax
        working-directory: .
        run: find web -type f -name '*.js' ! -name 'mock.js' ! -name '*.bak' -print0 | sort -z | xargs -0 -n1 node --check
