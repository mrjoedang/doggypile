name: Release - Auto

on:
  push:
    branches: [main]

concurrency:
  group: doggypile-auto-release-main
  cancel-in-progress: false

jobs:
  publish:
    name: Create release commit and tag
    runs-on: ubuntu-24.04
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Configure release git identity
        run: |
          git config user.name "doggypile release bot"
          git config user.email "doggypile-release-bot@users.noreply.github.com"

      - name: Publish next release
        env:
          GH_TOKEN: ${{ github.token }}
          DOGGYPILE_PUBLISH_BRANCH: main
        run: node scripts/publish.mjs --no-wait
