name: Deploy PWA to GitHub Pages

# Deploy the static web/ directory. The wasm transport is committed under
# web/vendor/iroh, so no build/toolchain runs here.
on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Verify content-addressed WASM assets
        env:
          HISTORY_REF: ${{ github.event.before }}
        run: |
          if [[ -n "$HISTORY_REF" && ! "$HISTORY_REF" =~ ^0+$ ]]; then
            npm run check:wasm-assets -- --history-ref "$HISTORY_REF"
          else
            npm run check:wasm-assets
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
